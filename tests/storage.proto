syntax = "proto3";
package storage;

message WriteRequest {
    string key   = 1;
    string value = 2;
}

message ReadRequest {
    string key = 1;
}

message ReadResponse {
    bool   ok    = 1;
    string value = 2;
}

// Service definition used by quorums-build to generate typed wrappers.
service Storage {
    rpc Read  (ReadRequest)  returns (ReadResponse);
    rpc Write (WriteRequest) returns (ReadResponse);
}
